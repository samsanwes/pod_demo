project_id = "pod-demo"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/**"]
jwt_expiry = 3600
enable_signup = false

[functions.generate-order-number]
verify_jwt = false

# NOTE: verify_jwt=false lets the function handle its own auth.
# This is intentional — ES256-signed Supabase JWTs aren't supported by the
# gateway verifier at the moment, so each function validates the caller's
# token + role via supabase.auth.getUser() before proceeding.
[functions.calculate-price]
verify_jwt = false

[functions.create-user]
verify_jwt = false

[functions.delete-user]
verify_jwt = false
